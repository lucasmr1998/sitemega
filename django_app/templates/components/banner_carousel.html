<section id="hero" class="relative group">
    <div class="grid grid-cols-1 grid-rows-1">
        {% for banner in data.banners %}
            <div class="banner-slide col-start-1 row-start-1 transition-opacity duration-1000 ease-in-out {% if forloop.first %}opacity-100 z-10{% else %}opacity-0 z-0{% endif %}" data-index="{{ forloop.counter0 }}">
                <a href="{{ banner.link|default:'#' }}" class="block w-full">
                    <img src="{{ banner.image }}" alt="{{ banner.title|default:'' }}" class="w-full h-auto object-contain block">
                </a>
            </div>
        {% endfor %}
    </div>

    {% if data.banners|length > 1 %}
        <button id="hero-prev" class="absolute left-4 top-1/2 -translate-y-1/2 z-30 bg-black/30 hover:bg-black/50 rounded-full p-3 transition text-white">
            <i class="fa-solid fa-chevron-left w-6 h-6 flex items-center justify-center"></i>
        </button>
        <button id="hero-next" class="absolute right-4 top-1/2 -translate-y-1/2 z-30 bg-black/30 hover:bg-black/50 rounded-full p-3 transition text-white">
            <i class="fa-solid fa-chevron-right w-6 h-6 flex items-center justify-center"></i>
        </button>
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-30 flex items-center gap-2">
            {% for banner in data.banners %}
                <button class="hero-indicator h-2 rounded-full transition-all shadow-sm {% if forloop.first %}w-8 bg-white{% else %}w-2 bg-white/50 hover:bg-white/80{% endif %}" data-index="{{ forloop.counter0 }}"></button>
            {% endfor %}
        </div>
    {% endif %}
</section>
