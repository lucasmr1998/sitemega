<section class="py-20 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col lg:flex-row items-center gap-16">
            <div class="w-full lg:w-1/2">
                <div class="relative rounded-[2.5rem] overflow-hidden shadow-2xl">
                    <div class="bg-gray-800 w-full relative flex items-center justify-center p-8 lg:p-12">
                        <div class="absolute inset-0 bg-gradient-to-br from-[{{ config.primary_dark_color }}] to-black opacity-90"></div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i class="fa-solid fa-shield-cat text-9xl text-white opacity-10"></i>
                        </div>
                        <div class="relative w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 p-5 rounded-3xl shadow-2xl">
                            <div class="flex items-center gap-4 mb-2 px-1">
                                <div class="w-10 h-10 rounded-full bg-[{{ config.accent_color }}] flex items-center justify-center text-white text-lg">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <div class="text-white">
                                    <div class="font-bold text-base leading-tight">{{ data.card_title|default:'Tranquilidade Garantida' }}</div>
                                    <div class="text-[10px] text-gray-200 opacity-90">{{ data.card_subtitle }}</div>
                                </div>
                            </div>
                            <div class="space-y-2">
                                {% for b in data.benefits %}
                                <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition">
                                    <i class="{{ b.icon }} text-[{{ config.secondary_color }}] text-lg"></i>
                                    <div>
                                        <div class="text-white font-bold text-xs">{{ b.title }}</div>
                                        <div class="text-[10px] text-gray-200 opacity-80">{{ b.description }}</div>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-1/2">
                {% if data.tag %}<span class="text-[{{ config.secondary_color }}] font-bold uppercase tracking-wider text-sm mb-2 block">{{ data.tag }}</span>{% endif %}
                <h2 class="text-4xl font-bold text-[{{ config.primary_color }}] mb-6 leading-tight">{{ data.heading }}</h2>
                <p class="text-lg text-gray-600 mb-8 leading-relaxed">{{ data.description }}</p>
                {% if data.cta_text %}
                <a href="{{ data.cta_link|default:'#' }}" class="inline-flex items-center bg-[{{ config.primary_color }}] text-white font-bold py-3 px-8 rounded-full hover:bg-blue-800 transition shadow-md">
                    {{ data.cta_text }} <i class="fa-solid fa-arrow-right ml-2"></i>
                </a>
                {% endif %}
            </div>
        </div>
    </div>
</section>
