<section class="py-24 bg-white overflow-hidden">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col lg:flex-row items-center gap-16 lg:gap-24">
            <div class="w-full lg:w-1/3 text-left">
                <h2 class="text-4xl md:text-5xl font-extrabold text-[{{ config.primary_color }}] leading-tight mb-8">{{ data.heading }}</h2>
                {% if data.cta_text %}
                <a href="{{ data.cta_link|default:'#' }}" class="inline-block bg-[{{ config.secondary_color }}] text-white font-bold text-lg px-10 py-4 rounded-lg hover:shadow-lg transition mt-4">{{ data.cta_text }}</a>
                {% endif %}
            </div>

            <div class="w-full lg:w-2/3">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 relative">
                    {% for combo in data.combos %}
                    <div class="relative group h-full z-0 hover:z-10">
                        <div class="bg-gray-50 rounded-[2rem] shadow-sm h-full flex flex-col hover:-translate-y-2 transition-transform duration-300">
                            <div class="h-48 relative flex items-center justify-center p-6 rounded-t-[2rem] overflow-hidden" style="background-color: {{ combo.color|default:'#2323FA' }}">
                                <i class="fa-solid {{ combo.icon }} text-white text-8xl absolute opacity-20 -rotate-12"></i>
                                <i class="fa-solid {{ combo.icon }} text-white text-5xl relative z-10 drop-shadow-sm"></i>
                            </div>
                            <div class="p-8 flex-1 bg-[#F9FAFB] rounded-b-[2rem] relative">
                                <h3 class="text-xl font-bold text-gray-900 mb-4">{{ combo.title }}</h3>
                                <p class="text-sm text-gray-500 leading-relaxed font-medium">{{ combo.description }}</p>
                                {% if not forloop.last %}
                                <div class="hidden md:flex absolute top-1/2 -translate-y-1/2 -right-6 z-20 w-8 h-8 items-center justify-center text-gray-800 text-3xl font-bold">
                                    <i class="fa-solid fa-plus"></i>
                                </div>
                                {% endif %}
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</section>
