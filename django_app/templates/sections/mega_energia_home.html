{% if mega_energia %}
<section class="py-16 bg-white overflow-hidden">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            <div>
                <h2 class="text-4xl md:text-5xl font-bold mb-6 leading-tight text-[{{ config.primary_color }}]">
                    {{ mega_energia.heading }}
                    <br />
                    <span class="text-[{{ config.secondary_color }}]">{{ mega_energia.heading_highlight }}</span>
                </h2>
                <p class="text-lg text-gray-600 leading-relaxed mb-8">
                    {{ mega_energia.description }}
                </p>
                <a href="{{ mega_energia.cta_link }}" class="inline-flex items-center justify-center bg-[{{ config.secondary_color }}] text-white font-bold py-3 px-8 rounded-lg hover:bg-orange-600 transition shadow-md group">
                    {{ mega_energia.cta_text }}
                    <i class="fa-solid fa-arrow-right ml-2 transform group-hover:translate-x-1 transition-transform"></i>
                </a>
            </div>

            <div class="flex justify-center lg:justify-end">
                <div class="bg-gray-50 rounded-[2rem] p-10 max-w-md w-full shadow-lg hover:shadow-xl transition-all duration-300 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-[{{ config.primary_color }}] opacity-10 rounded-bl-[4rem]"></div>
                    <div class="absolute bottom-0 left-0 w-24 h-24 bg-[{{ config.secondary_color }}] opacity-5 rounded-tr-[3rem]"></div>

                    <div class="mb-8 relative z-10">
                        <div class="w-20 h-20 rounded-2xl bg-[{{ config.primary_color }}] flex items-center justify-center shadow-md transform group-hover:scale-110 transition-transform duration-300">
                            <i class="fa-solid fa-bolt text-3xl text-white"></i>
                        </div>
                    </div>

                    <h3 class="text-2xl font-bold text-gray-900 mb-2">{{ mega_energia.card_title }}</h3>
                    <div class="w-12 h-1 bg-[{{ config.secondary_color }}] mb-6 rounded-full"></div>

                    <ul class="space-y-4 mb-8">
                        {% for item in mega_energia.card_features %}
                            <li class="flex items-center text-gray-600">
                                <i class="fa-solid fa-check-circle text-[{{ config.primary_color }}] mr-3 text-lg"></i>
                                <span>{{ item }}</span>
                            </li>
                        {% endfor %}
                    </ul>

                    <div class="pt-6 border-t border-gray-100">
                        <span class="text-sm font-bold text-gray-400 uppercase tracking-wider">Economia garantida</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endif %}
