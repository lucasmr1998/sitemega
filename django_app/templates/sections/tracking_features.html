<section class="py-20 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center max-w-3xl mx-auto mb-16">
            <h2 class="text-3xl md:text-4xl font-bold text-[{{ config.primary_color }}] mb-4">Tudo o que você precisa para assumir o controle</h2>
            <p class="text-gray-600 text-lg">Tecnologia avançada para monitorar e proteger seu patrimônio 24 horas por dia.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            {% for feature in features %}
            <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-100 hover:shadow-xl transition duration-300 group">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-[{{ config.primary_color }}] transition-colors duration-300">
                    <i class="{{ feature.icon_class }} text-3xl text-[{{ config.primary_color }}] group-hover:text-white transition-colors duration-300"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-3">{{ feature.title }}</h3>
                <p class="text-gray-500 leading-relaxed">{{ feature.description }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
