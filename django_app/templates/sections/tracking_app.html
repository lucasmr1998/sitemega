{% if app_promo %}
<section class="py-20 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            <div class="order-2 md:order-1 flex justify-center md:justify-start">
                <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full shadow-2xl border border-gray-100 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-[{{ config.primary_color }}] rounded-bl-full opacity-5"></div>
                    <div class="flex items-center justify-center w-20 h-20 rounded-2xl bg-[{{ config.primary_color }}] text-white text-3xl mb-8 shadow-md">
                        <i class="fa-solid fa-map-location-dot"></i>
                    </div>
                    <h3 class="text-3xl font-bold text-gray-900 mb-2">{{ app_promo.card_title }}</h3>
                    <div class="w-12 h-1.5 bg-[{{ config.secondary_color }}] mb-6 rounded-full"></div>
                    <p class="text-gray-500 mb-8 font-medium">{{ app_promo.card_description }}</p>

                    <div class="flex gap-3">
                        {% if app_promo.app_store_url %}
                        <a href="{{ app_promo.app_store_url }}" target="_blank"
                            class="bg-black text-white px-5 py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-800 transition flex-1">
                            <i class="fa-brands fa-apple text-2xl"></i>
                            <div class="text-left leading-tight"><div class="font-bold text-xs">App Store</div></div>
                        </a>
                        {% endif %}
                        {% if app_promo.google_play_url %}
                        <a href="{{ app_promo.google_play_url }}" target="_blank"
                            class="bg-black text-white px-5 py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-800 transition flex-1">
                            <i class="fa-brands fa-google-play text-xl"></i>
                            <div class="text-left leading-tight"><div class="font-bold text-xs">Google Play</div></div>
                        </a>
                        {% endif %}
                    </div>
                </div>
            </div>

            <div class="order-1 md:order-2">
                <span class="text-[{{ config.secondary_color }}] font-bold uppercase tracking-wider text-sm mb-2 block">Tecnologia Mobile</span>
                <h2 class="text-4xl md:text-5xl font-bold text-[{{ config.primary_color }}] mb-6 leading-tight">
                    {{ app_promo.heading }}
                </h2>
                <p class="text-lg text-gray-600 mb-8 leading-relaxed">{{ app_promo.description }}</p>
            </div>
        </div>
    </div>
</section>
{% endif %}
