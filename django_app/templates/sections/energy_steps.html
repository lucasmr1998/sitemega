<section class="py-20 bg-gray-50 overflow-hidden relative">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="flex flex-col lg:flex-row items-start justify-between gap-16">
            <div class="w-full lg:w-1/3 sticky top-24">
                <span class="text-[{{ config.primary_color }}] font-bold tracking-wider uppercase text-sm mb-2 block">Passo a passo</span>
                <h2 class="text-4xl font-extrabold text-gray-900 mb-6">Veja como é fácil</h2>
                <p class="text-gray-600 mb-8 text-lg">
                    Todo o processo é feito online, de forma rápida e segura. Comece a economizar em poucos cliques.
                </p>
                <a href="#"
                    class="bg-[{{ config.primary_color }}] text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg inline-flex items-center gap-2">
                    Simule agora mesmo
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>

            <div class="w-full lg:w-1/2 space-y-12">
                {% for step in steps %}
                <div class="flex gap-6 group">
                    <div class="flex-shrink-0 w-12 h-12 rounded-full {% if forloop.last %}bg-[{{ config.primary_color }}] text-white{% else %}bg-white border-2 border-[{{ config.primary_color }}] text-[{{ config.primary_color }}]{% endif %} font-bold text-xl flex items-center justify-center shadow-sm relative z-10 {% if not forloop.last %}group-hover:bg-[{{ config.primary_color }}] group-hover:text-white{% endif %} transition-colors">
                        {{ step.number }}
                    </div>
                    <div class="pt-2">
                        <h4 class="text-xl font-bold text-gray-900 mb-2">{{ step.title }}</h4>
                        <p class="text-gray-600">{{ step.description }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
