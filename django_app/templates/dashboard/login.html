{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MegaLink Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#2323FA] to-[#040470] flex items-center justify-center font-['Inter']">
    <div class="w-full max-w-md px-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-[#2323FA] rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-bolt text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">MegaLink</h1>
                <p class="text-sm text-gray-500 mt-1">Painel de Gerenciamento</p>
            </div>

            {% if form.errors %}
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-4">
                    Usuário ou senha inválidos.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1.5">Usuário</label>
                        <input type="text" name="username" required autofocus
                            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-[#2323FA] focus:border-[#2323FA] outline-none transition"
                            placeholder="admin">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1.5">Senha</label>
                        <input type="password" name="password" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-[#2323FA] focus:border-[#2323FA] outline-none transition"
                            placeholder="••••••••">
                    </div>
                    <button type="submit"
                        class="w-full bg-[#2323FA] text-white font-bold py-3 rounded-lg hover:bg-[#1a1ab8] transition shadow-lg text-sm">
                        Entrar
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
