{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview - {{ page.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Barlow', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="font-sans bg-white">
    {% for section in sections %}
        {% with data=section.data component=section.component_type %}
            {% include section.template %}
        {% endwith %}
    {% empty %}
        <div class="flex items-center justify-center h-screen text-gray-400">
            <div class="text-center">
                <i class="fa-solid fa-eye-slash text-4xl mb-3"></i>
                <p class="text-sm">Nenhum componente ativo nesta página.</p>
            </div>
        </div>
    {% endfor %}
</body>
</html>
