    <script>
        var sorteado = 4;

        function sleep(milliseconds) {
            var start = new Date().getTime();
            for (var i = 0; i < 1e7; i++) {
                if ((new Date().getTime() - start) > milliseconds) {
                    break;
                }
            }
        }

        imagem_atual = 0;
        velocidade = 1025;
        etapa = 0;
        acabou = false;
        premio = "Você ganhou 1 mês gratis!";

        function trocaImagem() {
            if(!acabou){
    
                image_velha = "roleta" + ("00" + imagem_atual).slice(-2);
                image_nova = "roleta" + ("00" + (imagem_atual + 1)).slice(-2);

                if (imagem_atual == 12) {
                    image_velha = "roleta" + ("00" + imagem_atual).slice(-2);
                    image_nova = "roleta01";
                    imagem_atual = 0;
                }

                $("#" + image_velha).hide(0);
                $("#" + image_nova).show(0);    
                

                console.log(image_nova);
                imagem_atual++;
                if (etapa == 0) {
                    velocidade = velocidade - 125;
                    if (velocidade < 150) {
                        etapa = 1;
                        contador = 0;
                    }
                }
                if (etapa == 1) {
                    contador++;
                    if (contador == 50) {
                        etapa = 2;
                    }
                }
                if (etapa == 2) {
                    velocidade = velocidade + 125;
                    if (velocidade > 800) {
                        etapa = 3;
                    }
                }
                if (etapa == 3) {
                    if (imagem_atual == sorteado) {
                        acabou = true;
                    }
                }
                setTimeout(trocaImagem, velocidade);
            }else{
                switch(imagem_atual) {
                    case 1:
                        premio = "Você ganhou uma caderneta personalizada da Vetorial!";
                        break;
                    case 2:

                        break;
                    case 4:

                        break;
                    case 5:

                        break;
                    case 6:
                        premio = "Você ganhou 2 meses de internet grátis!"
                        break;
                    case 7:
                        premio = "Você ganhou 1 mês de internet grátis!"
                        break;
                    case 8:

                        break;
                    case 9:

                        break;
                    case 10:

                        break;
                    case 11:
                        premio = "Você ganhou 3 meses de internet grátis!"
                        break;
                    case 12:
                        premio = "Você ganhou a taxa de instalação grátis!"
                        break;
                    default:
                        premio = "Você ganhou 1 mês de internet grátis!"
                        break;
                } 

                alert(premio);
            }
        }

        trocaImagem();
